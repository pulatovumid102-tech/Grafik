<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Forex Checklist</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 10px; font-size: 13px; }
.wrap { width: 100%; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #e0e0dc; }
.title { font-size: 17px; font-weight: 700; }
.date-wrap { display: flex; align-items: center; gap: 5px; }
input[type=date] { background: #ebebea; border: none; border-radius: 7px; padding: 5px 7px; font-size: 12px; font-weight: 500; color: #1a1a1a; font-family: inherit; outline: none; }
.day-badge { background: #ebebea; border-radius: 7px; padding: 5px 9px; font-size: 12px; font-weight: 500; color: #555; }

.main { display: flex; gap: 8px; align-items: flex-start; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.left { flex-shrink: 0; }
.left table { border-collapse: collapse; font-size: 12px; }
.left th { background: #ebebea; color: #888; font-weight: 500; padding: 6px 8px; text-align: center; border: 0.5px solid #ddd; }
.left td { padding: 4px 8px; border: 0.5px solid #ddd; text-align: center; height: 30px; }
.num-cell { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; user-select: none; border: 1.5px solid transparent; }
.num-cell.selected { border-color: #1a1a1a; }
input[type=checkbox] { width: 17px; height: 17px; cursor: pointer; accent-color: #1a1a1a; }

.right { flex-shrink: 0; }
.right table { border-collapse: collapse; font-size: 12px; }
.right td { padding: 4px 7px; border: 0.5px solid #ddd; height: 30px; vertical-align: middle; }
.right td.label { font-style: italic; color: #888; width: 100px; }
.right td.cb { width: 34px; text-align: center; }
.right td.close-td { padding: 2px 5px; }
.uline { width: 34px; border-bottom: 1px solid #aaa; display: inline-block; min-height: 14px; vertical-align: bottom; text-align: center; font-size: 12px; font-weight: 500; }
.no-lbl { color: #888; font-size: 12px; margin-right: 2px; }
input[type=text].time-inp { border: none; outline: none; background: transparent; font-size: 12px; font-family: inherit; color: #1a1a1a; width: 46px; border-bottom: 1px solid #ccc; padding: 1px 0; }
input[type=datetime-local] { border: none; outline: none; background: transparent; font-size: 10px; font-family: inherit; color: #1a1a1a; width: 100%; cursor: pointer; padding: 0; }

.journal-section { margin-top: 14px; border-top: 1px solid #e0e0dc; padding-top: 12px; }
.journal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.journal-title { font-size: 14px; font-weight: 600; }
.save-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.save-btn:disabled { opacity: 0.4; }
.save-status { font-size: 11px; color: #888; margin-top: 4px; text-align: right; }
.journal-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.journal-table { border-collapse: collapse; font-size: 12px; min-width: 560px; width: 100%; }
.journal-table th { background: #ebebea; color: #888; font-weight: 500; padding: 6px 8px; text-align: left; border: 0.5px solid #ddd; white-space: nowrap; }
.journal-table td { padding: 6px 8px; border: 0.5px solid #ddd; white-space: nowrap; }
.journal-table td:first-child { text-align: center; width: 28px; }
.long-badge { color: #16a34a; font-weight: 600; }
.short-badge { color: #dc2626; font-weight: 600; }
.empty-msg { text-align: center; color: #bbb; font-size: 12px; padding: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span class="title">Forex Checklist</span>
    <div class="date-wrap">
      <input type="date" id="datepicker">
      <span class="day-badge" id="dayname"></span>
    </div>
  </div>

  <div class="main">
    <div class="left">
      <table>
        <thead><tr><th>№</th><th>Instrument</th><th>Opened</th></tr></thead>
        <tbody id="inst-body"></tbody>
      </table>
    </div>
    <div class="right">
      <table>
        <tbody>
          <tr>
            <td class="label" style="font-style:normal;font-weight:600;">Setup:</td>
            <td class="cb"><span class="no-lbl">№</span><span class="uline" id="slot1"></span></td>
            <td class="cb"><span class="uline" id="slot2"></span></td>
            <td class="cb"><span class="uline" id="slot3"></span></td>
          </tr>
          <tr><td class="label">UPTREND</td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td></tr>
          <tr><td class="label">DOWNTREND</td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td></tr>
          <tr><td class="label">M5</td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td></tr>
          <tr><td class="label">M15</td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td></tr>
          <tr><td class="label">RSI 70/30</td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td></tr>
          <tr><td class="label">RSI DIVERGENCE</td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td></tr>
          <tr><td class="label">MA H1</td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td></tr>
          <tr><td class="label">MA H4</td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td></tr>
          <tr><td class="label">MA D1</td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td><td class="cb"><input type="checkbox"></td></tr>
          <tr><td colspan="4" style="height:10px;border:none;background:transparent;"></td></tr>
          <tr>
            <td class="label">Time:</td>
            <td class="cb"><input type="text" class="time-inp" id="time1" placeholder="12:38" maxlength="5" oninput="updateTrades()"></td>
            <td class="cb"><input type="text" class="time-inp" id="time2" placeholder="12:38" maxlength="5" oninput="updateTrades()"></td>
            <td class="cb"><input type="text" class="time-inp" id="time3" placeholder="12:38" maxlength="5" oninput="updateTrades()"></td>
          </tr>
          <tr><td class="label">LONG</td><td class="cb"><input type="checkbox" id="long1" onchange="updateLS(0,'LONG',this)"></td><td class="cb"><input type="checkbox" id="long2" onchange="updateLS(1,'LONG',this)"></td><td class="cb"><input type="checkbox" id="long3" onchange="updateLS(2,'LONG',this)"></td></tr>
          <tr><td class="label">SHORT</td><td class="cb"><input type="checkbox" id="short1" onchange="updateLS(0,'SHORT',this)"></td><td class="cb"><input type="checkbox" id="short2" onchange="updateLS(1,'SHORT',this)"></td><td class="cb"><input type="checkbox" id="short3" onchange="updateLS(2,'SHORT',this)"></td></tr>
          <tr><td class="label">SL</td><td class="cb"><input type="checkbox" id="sl1" onchange="updateTrades()"></td><td class="cb"><input type="checkbox" id="sl2" onchange="updateTrades()"></td><td class="cb"><input type="checkbox" id="sl3" onchange="updateTrades()"></td></tr>
          <tr><td class="label">RR 1:1</td><td class="cb"><input type="checkbox" id="rr11_1" onchange="updateTrades()"></td><td class="cb"><input type="checkbox" id="rr11_2" onchange="updateTrades()"></td><td class="cb"><input type="checkbox" id="rr11_3" onchange="updateTrades()"></td></tr>
          <tr><td class="label">RR 1:2</td><td class="cb"><input type="checkbox" id="rr12_1" onchange="updateTrades()"></td><td class="cb"><input type="checkbox" id="rr12_2" onchange="updateTrades()"></td><td class="cb"><input type="checkbox" id="rr12_3" onchange="updateTrades()"></td></tr>
          <tr><td class="label">RR 1:3</td><td class="cb"><input type="checkbox" id="rr13_1" onchange="updateTrades()"></td><td class="cb"><input type="checkbox" id="rr13_2" onchange="updateTrades()"></td><td class="cb"><input type="checkbox" id="rr13_3" onchange="updateTrades()"></td></tr>
          <tr>
            <td class="label">CLOSE:</td>
            <td class="close-td"><input type="datetime-local" id="close1" onchange="updateTrades()"></td>
            <td class="close-td"><input type="datetime-local" id="close2" onchange="updateTrades()"></td>
            <td class="close-td"><input type="datetime-local" id="close3" onchange="updateTrades()"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="journal-section">
    <div class="journal-header">
      <div class="journal-title">Bitimlar jurnali</div>
      <button class="save-btn" id="save-btn" onclick="saveToSheets()">Sheetsga saqlash</button>
    </div>
    <div class="save-status" id="save-status"></div>
    <div class="journal-wrap">
      <table class="journal-table">
        <thead>
          <tr><th>№</th><th>Sana</th><th>Instrument</th><th>L/S</th><th>Vaqt</th><th>SL</th><th>RR1</th><th>RR2</th><th>RR3</th><th>Close</th></tr>
        </thead>
        <tbody id="journal-body">
          <tr><td colspan="10" class="empty-msg">Hali bitim ochilmagan</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwm7uHr_JS0MW8dQhlxpXLd9cunrZRjReQazwRFE4psuSvzz46iE5t8ErNAHwyKvLBGWQ/exec';
const instruments = ['XAUUSD','DJ30','NASDAQ','SPX500','EURUSD','GBPUSD','AUDUSD','NZDUSD','USDCHF','USDCAD','USDJPY','EURGBP','EURCAD','EURJPY','EURAUD','EURCHF','GBPJPY','GBPAUD','AUDCAD','AUDJPY','CADCHF','CADJPY','NZDJPY','CHFJPY'];
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const openedSlots = [null, null, null];
const lsState = ['', '', ''];
const savedTradeIds = {};

function buildTable() {
  const tbody = document.getElementById('inst-body');
  tbody.innerHTML = '';
  instruments.forEach((name, i) => {
    const num = i + 1;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><span class="num-cell" onclick="toggleNum(this)">${num}</span></td><td>${name}</td><td><input type="checkbox" onchange="toggleOpened(this, ${num})"></td>`;
    tbody.appendChild(tr);
  });
}

function toggleNum(el) { el.classList.toggle('selected'); }

function toggleOpened(cb, num) {
  if (cb.checked) {
    const emptySlot = openedSlots.indexOf(null);
    if (emptySlot !== -1) { openedSlots[emptySlot] = num; }
    else { cb.checked = false; return; }
  } else {
    const idx = openedSlots.indexOf(num);
    if (idx !== -1) { openedSlots[idx] = null; lsState[idx] = ''; }
  }
  updateSlots();
  updateTrades();
}

function updateLS(slotIdx, type, cb) {
  if (cb.checked) {
    lsState[slotIdx] = type;
    const otherId = type === 'LONG' ? `short${slotIdx+1}` : `long${slotIdx+1}`;
    document.getElementById(otherId).checked = false;
  } else { lsState[slotIdx] = ''; }
  updateTrades();
}

function updateSlots() {
  [1,2,3].forEach(i => {
    document.getElementById('slot'+i).textContent = openedSlots[i-1] !== null ? openedSlots[i-1] : '';
  });
}

function getDateStr() {
  const dp = document.getElementById('datepicker');
  if (!dp.value) return '';
  const [y,m,d] = dp.value.split('-');
  return `${d}.${m}`;
}

function getCloseStr(idx) {
  const el = document.getElementById(`close${idx+1}`);
  if (!el.value) return '—';
  const dt = new Date(el.value);
  const d = String(dt.getDate()).padStart(2,'0');
  const m = String(dt.getMonth()+1).padStart(2,'0');
  const h = String(dt.getHours()).padStart(2,'0');
  const min = String(dt.getMinutes()).padStart(2,'0');
  return `${d}.${m} ${h}:${min}`;
}

function cbCheck(id) {
  const el = document.getElementById(id);
  return el && el.checked ? '✓' : '—';
}

function getTradeRows() {
  const rows = [];
  openedSlots.forEach((num, i) => {
    if (num !== null) {
      rows.push({
        sana: getDateStr(),
        instrument: instruments[num-1],
        ls: lsState[i] || '—',
        vaqt: (document.getElementById(`time${i+1}`).value || '').trim() || '—',
        sl: cbCheck(`sl${i+1}`),
        rr11: cbCheck(`rr11_${i+1}`),
        rr12: cbCheck(`rr12_${i+1}`),
        rr13: cbCheck(`rr13_${i+1}`),
        close: getCloseStr(i)
      });
    }
  });
  return rows;
}

function updateTrades() {
  const tbody = document.getElementById('journal-body');
  const rows = getTradeRows();
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty-msg">Hali bitim ochilmagan</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map((r, i) => `
    <tr>
      <td>${i+1}</td><td>${r.sana}</td><td>${r.instrument}</td>
      <td class="${r.ls==='LONG'?'long-badge':r.ls==='SHORT'?'short-badge':''}">${r.ls}</td>
      <td>${r.vaqt}</td>
      <td style="text-align:center">${r.sl}</td>
      <td style="text-align:center">${r.rr11}</td>
      <td style="text-align:center">${r.rr12}</td>
      <td style="text-align:center">${r.rr13}</td>
      <td>${r.close}</td>
    </tr>`).join('');
}

async function saveToSheets() {
  const rows = getTradeRows();
  if (rows.length === 0) { document.getElementById('save-status').textContent = 'Saqlash uchun bitim yoq!'; return; }
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true; btn.textContent = 'Saqlanmoqda...'; status.textContent = '';
  let saved = 0;
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const key = row.instrument + '_' + row.sana;
    try {
      let params;
      if (savedTradeIds[key]) {
        params = new URLSearchParams({ action:'update', tradeId:savedTradeIds[key], sl:row.sl, rr11:row.rr11, rr12:row.rr12, rr13:row.rr13, close:row.close });
      } else {
        params = new URLSearchParams({ action:'save', sana:row.sana, instrument:row.instrument, ls:row.ls, vaqt:row.vaqt, sl:row.sl, rr11:row.rr11, rr12:row.rr12, rr13:row.rr13, close:row.close });
      }
      const img = new Image();
      img.src = SCRIPT_URL + '?' + params.toString();
      await new Promise(resolve => setTimeout(resolve, 1500));
      if (!savedTradeIds[key]) savedTradeIds[key] = i + 1;
      saved++;
    } catch(e) {}
  }
  btn.disabled = false; btn.textContent = 'Sheetsga saqlash';
  status.textContent = `✓ ${saved} ta bitim saqlandi — ${new Date().toLocaleTimeString()}`;
}

function setDate(val) {
  if (!val) return;
  const [y,m,d] = val.split('-').map(Number);
  document.getElementById('dayname').textContent = days[new Date(y,m-1,d).getDay()];
  updateTrades();
}

const today = new Date();
const todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
const dp = document.getElementById('datepicker');
dp.value = todayStr; setDate(todayStr);
dp.addEventListener('change', () => setDate(dp.value));
buildTable();
</script>
</body>
</html>
